name: scrape
on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: python -m openground_diff.main
      - name: Restore last-notified marker
        uses: actions/cache@v4
        with:
          path: data/.last_notified
          key: last-notified-${{ hashFiles('data/history.jsonl') }}
          restore-keys: last-notified-
      - id: commit
        name: Commit data + site
        run: |
          if [ -n "$(git status --porcelain data site)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data site
            git commit -m "scrape: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Matrix
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: python scripts/notify_matrix.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
